<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@100..900&display=swap" rel="stylesheet">

    <link rel='stylesheet' type='text/css' href='/style.css'>
    <style>
        body, html {
            margin: 0;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100lvh;
            width: 100%;
        }
        body::before{
            content: '';
            z-index: -1;
            position: fixed;
            top: 0;
            left: 0;
            height: 100lvh;
            width: 100%;
            background-image: url('/FietsTogetherTitlePage.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transform: scale(1.1);
            filter: blur(var(--blur-value, 0px));
        }
        .site-header {
            position: fixed;
            top: 0;
            right: 0;
            padding: 1em;
            z-index: 10;
        }
        .social-icons a {
            display: inline-block;
            margin-left: 1em;
        }
        .social-icons svg {
            width: 3em;
            height: 3em;
            fill: white;
        }
        a {
            color: inherit;
            text-decoration: none;
            cursor: default;
        }
        main {
            margin: 2vh;
            flex-grow: 1;
            width: 100%;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        footer {
            height: 5vh;
            width: 100%;
            flex-shrink: 0;

            background-color: rgb(199, 80, 0);
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;

            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }
    </style>
    {{ block "styles" . }}{{ end }}
</head>
<body>
    {{ if not .Params.hideHeader }}
    <header class="site-header">
        {{ partial "social-icons.html" . }}
    </header>
    {{ end }}

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    {{ if not .Params.hideFooter }}
    <footer>
        {{ partial "footer.html" . }}
    </footer>
    {{ end }}
    
    <script>
        window.addEventListener('scroll', function() {
            const blurValue = Math.min(window.scrollY / 100, 10);
            document.body.style.setProperty('--blur-value', blurValue + 'px');
        });
    </script>
    {{ block "scripts" . }}{{ end }}
</body>
</html>
