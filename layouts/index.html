{{ define "styles" }}
<style>
    body{
        background: none;
    }
    body::before{
        content: '';
        z-index: -1;
        position: fixed;
        top: 0;
        left: 0;
        height: 100lvh;
        width: 100%;
        background-image: url('/FietsTogetherTitlePage.webp');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        transform: scale(1.1);
        filter: blur(var(--blur-value, 0px));
    }
    main{
        margin-top: 0;
    }
    .hero-content {
        height: 100lvh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        padding: 0 1em;
        box-sizing: border-box;
    }
    @media screen and (orientation: portrait){
        .hero-content {
            max-height: 50lvh;
        }
    }   
    .hero-content p {
        font-size: clamp(1.2rem, 4vw, 2rem);
        margin: 0;
    }
    .hero-content h1 {
        font-size: clamp(2.5rem, 8vw + 1rem, 7rem);
        margin: 0.2em 0;
    }
    .form-section {
        padding: 20vh 1em;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        min-height: 60vh;
    }
    .video-container{
        display: flex;
        padding-bottom: 3%;
        flex-direction: column;
        align-items: center;
        width: 90vw;
        max-height: 80lvh;
        background-color: var(--alea-darkgreen);
        border: 5px solid var(--alea-darkgreen);
        border-radius: 25px;
    }
    video {
        max-width: 90%;
        max-height: 85lvh;
    }
</style>
{{ end }}

{{ define "main" }}
<div class="hero-content">
    {{ .Content }}
</div>

<div class="video-container">
    <h2>Fiets - Together Trailer</h2>
    <video controls autoplay>
        <source src="{{ "Trailer.webm" | relURL }}" type="video/webm">
        Your browser does not support the video tag.
    </video>
</div>
{{ end }}
