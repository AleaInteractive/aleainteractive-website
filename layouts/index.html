{{ define "styles" }}
<style>
    body{
        background: none;
    }
    body::before{
        content: '';
        z-index: -1;
        position: fixed;
        top: 0;
        left: 0;
        height: 100lvh;
        width: 100%;
        background-image: url('/FietsTogetherTitlePage.webp');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        transform: scale(1.1);
        filter: blur(var(--blur-value, 0px));
    }
    .hero-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        padding: 0 1em;
        box-sizing: border-box;
    }
    .hero-content p {
        font-size: clamp(1.2rem, 4vw, 2rem);
        margin: 0;
    }
    .hero-content h1 {
        font-size: clamp(2.5rem, 8vw + 1rem, 7rem);
        margin: 0.2em 0;
    }
    .form-section {
        padding: 20vh 1em;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        min-height: 60vh;
    }
</style>
{{ end }}

{{ define "main" }}
<div class="hero-content">
    {{ .Content }}
</div>
<div class="form-section">
    {{ partial "mailerlite-form.html" . }}
</div>
{{ end }}
