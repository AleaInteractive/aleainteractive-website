{{ define "styles" }}
<style>
    .content-box {
	align-items: center;
    }
    .link-box {
        background-color: var(--alea-darkgreen);
        padding: 20px;
        border-radius: 8px;
        width: 50%;
        max-width: 450px;
        margin: 0 auto;
        display: flex;  
        flex-direction: column;
        justify-content: center;
        align-items: center; 
    }
    .link-box:hover {
        transform: translateY(-3px);
        cursor: pointer;
    }
</style>
{{ end }}

{{ define "main" }}
<div class="content-box">
    <h1>404 Not Found</h1>
    <p>The page you requested cannot be found.</p>
    <a class="link-box" href="{{ .Site.Home.RelPermalink }}">
        Please return to the home page!
    </a>
</div>
{{ end }}
